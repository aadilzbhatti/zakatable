[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Set up test command defaults (run coverage by default, show detailed output)
addopts = -v --cov=zakatable --cov-report=term-missing

# Ignore deprecation warnings from third-party libraries (e.g. Starlette/FastAPI/yfinance)
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
